apiVersion: awx.ansible.com/v1beta1
kind: AWX
metadata:
  name: awx
  namespace: awx
spec:
  service_type: ClusterIP
  ingress_type: ingress
  ingress_annotations: |
    traefik.ingress.kubernetes.io/router.entrypoints=web
  hostname: awx.local
  # PoC: sem volumes redundantes
  postgres_storage_class: local-path
  projects_storage_class: local-path
  # Recursos enxutos para PoC (Rundeck + AWX em 8GB)
  # Orçamento: AWX ~4.3Gi + Rundeck 2Gi + sistema ~1.7Gi = 8Gi
  web_resource_requirements:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 800m
      memory: 1536Mi
  task_resource_requirements:
    requests:
      cpu: 200m
      memory: 384Mi
    limits:
      cpu: 800m
      memory: 1Gi
  ee_resource_requirements:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 400m
      memory: 256Mi
  redis_resource_requirements:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  postgres_resource_requirements:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 512Mi
  # PoC: sem replicas extras
  web_replicas: 1
  task_replicas: 1
